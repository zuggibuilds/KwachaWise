name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install root dependencies
        run: npm ci
      - name: Build project
        run: npm run build
      - name: Run server npm audit
        run: npm --prefix server audit --audit-level=high
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-audit
          path: server
